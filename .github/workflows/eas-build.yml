name: EAS Build (iOS / Android)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 빌드 플랫폼
        type: choice
        default: ios
        options:
          - ios
          - android
          - all
      profile:
        description: EAS 빌드 프로파일
        type: choice
        default: preview
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS ${{ inputs.platform }} (${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build with EAS
        working-directory: artifacts/stock-dashboard
        run: eas build --non-interactive --no-wait --platform ${{ inputs.platform }} --profile ${{ inputs.profile }}
